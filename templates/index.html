<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ app_name }}</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090b; /* zinc-950 */
        --panel: rgba(24, 24, 27, 0.4); /* zinc-900/40 */
        --border: #27272a; /* zinc-800 */
        --muted: #a1a1aa; /* zinc-400 */
        --text: #fafafa; /* zinc-50 */
        --subtle: #d4d4d8; /* zinc-300 */
        --code-bg: #09090b;
        --shadow: 0 25px 60px rgba(0, 0, 0, 0.55);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }

      main {
        max-width: 48rem;
        margin: 0 auto;
        padding: 4rem 1.5rem;
      }

      .card {
        border-radius: 1rem;
        border: 1px solid var(--border);
        background: var(--panel);
        padding: 2rem;
        box-shadow: var(--shadow);
      }

      .kicker {
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--muted);
      }

      h1 {
        margin: 0.5rem 0 0;
        font-size: 1.875rem;
        line-height: 1.2;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0.75rem 0 0;
        color: var(--subtle);
        line-height: 1.6;
      }

      code {
        background: var(--code-bg);
        border: 1px solid var(--border);
        color: #e4e4e7;
        border-radius: 0.5rem;
        padding: 0.15rem 0.4rem;
        font-size: 0.9em;
      }

      .actions {
        margin-top: 1.5rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      a.btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.75rem;
        padding: 0.65rem 1rem;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.875rem;
      }

      a.primary {
        background: #fafafa;
        color: #09090b;
        border: 1px solid #fafafa;
      }

      a.primary:hover {
        background: #e4e4e7;
        border-color: #e4e4e7;
      }

      a.secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid #3f3f46; /* zinc-700 */
      }

      a.secondary:hover {
        background: rgba(39, 39, 42, 0.65);
      }

      .foot {
        margin-top: 2rem;
        font-size: 0.75rem;
        color: #71717a; /* zinc-500 */
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <p class="kicker">Python backend is running</p>
        <h1>{{ app_name }}</h1>
        <p>
          This is the new FastAPI app. Try the API endpoints:
          <code>/api/listings</code>
          and
          <code>/api/drivers</code>.
        </p>

        <div class="actions">
          <a class="btn primary" href="/docs">Open API docs</a>
          <a class="btn secondary" href="/healthz">Health check</a>
        </div>

        <p class="foot">
          Configure <code>SUPABASE_URL</code> and
          <code>SUPABASE_SERVICE_ROLE_KEY</code> in your
          environment to enable the database-backed routes.
        </p>
      </div>
    </main>
  </body>
</html>
