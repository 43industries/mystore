<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ app_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-zinc-950 text-zinc-50">
    <main class="mx-auto max-w-3xl px-6 py-16">
      <div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-8 shadow-2xl shadow-black/40">
        <p class="text-sm font-medium tracking-wide text-zinc-400">Python backend is running</p>
        <h1 class="mt-2 text-3xl font-semibold tracking-tight">{{ app_name }}</h1>
        <p class="mt-3 text-zinc-300">
          This is the new FastAPI app. Try the API endpoints:
          <code class="rounded bg-zinc-950 px-2 py-1 text-zinc-200">/api/listings</code>
          and
          <code class="rounded bg-zinc-950 px-2 py-1 text-zinc-200">/api/drivers</code>.
        </p>

        <div class="mt-6 flex flex-wrap gap-3">
          <a
            class="rounded-lg bg-white px-4 py-2 text-sm font-semibold text-zinc-950 hover:bg-zinc-200"
            href="/docs"
            >Open API docs</a
          >
          <a
            class="rounded-lg border border-zinc-700 px-4 py-2 text-sm font-semibold text-zinc-50 hover:bg-zinc-800"
            href="/healthz"
            >Health check</a
          >
        </div>

        <p class="mt-8 text-xs text-zinc-500">
          Configure <code class="rounded bg-zinc-950 px-1.5 py-0.5">SUPABASE_URL</code> and
          <code class="rounded bg-zinc-950 px-1.5 py-0.5">SUPABASE_SERVICE_ROLE_KEY</code> in your
          environment to enable the database-backed routes.
        </p>
      </div>
    </main>
  </body>
</html>
